# Сниппет для nginx перед location со статикой SPA (try_files ... /index.html).
# Иначе /admin/statics/*.css попадает в try_files → отдаётся index.html → админка без стилей.
#
# Замени UPSTREAM на свой бэкенд, например: http://127.0.0.1:8489

upstream parkrelax_backend {
    server 127.0.0.1:8489;
}

# Starlette-admin: HTML + /admin/statics/ (Tabler, FontAwesome, jQuery)
location ^~ /admin {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Куки входа админки (отдельный префикс от /admin)
location ^~ /admin-auth {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# React-дашборд в iframe (если открываете с этого же хоста)
location ^~ /admin-panel {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Публичный API (как на фронте: /api/...)
location ^~ /api/ {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
