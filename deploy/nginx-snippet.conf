# Сниппет для nginx перед location со статикой SPA (try_files ... /index.html).
# Иначе /admin/statics/*.css попадает в try_files → отдаётся index.html → админка без стилей.
#
# Замени UPSTREAM на свой бэкенд, например: http://127.0.0.1:8489

upstream parkrelax_backend {
    server 127.0.0.1:8489;
}

# Общие security-заголовки (добавляются ко всем location)
# Раскомментируй listen 443 ssl и ssl_* при настройке HTTPS
# listen 443 ssl http2;
# ssl_certificate /path/to/cert.pem;
# ssl_certificate_key /path/to/key.pem;
# ssl_session_timeout 1d;
# ssl_session_cache shared:SSL:50m;
# ssl_protocols TLSv1.2 TLSv1.3;
# ssl_ciphers HIGH:!aNULL:!MD5;
# ssl_prefer_server_ciphers off;

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; frame-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# HSTS (включить только после полной проверки HTTPS)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Редирект HTTP → HTTPS (раскомментировать после настройки сертификата)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# Starlette-admin: HTML + /admin/statics/ (Tabler, FontAwesome, jQuery)
location ^~ /admin {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Куки входа админки (отдельный префикс от /admin)
location ^~ /admin-auth {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# React-дашборд в iframe (если открываете с этого же хоста)
location ^~ /admin-panel {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Публичный API (как на фронте: /api/...)
location ^~ /api/ {
    proxy_pass http://parkrelax_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Статические ассеты с длительным кешированием (Vite хеширует файлы)
location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
}

# Загруженные изображения (uploads)
location ^~ /uploads/ {
    expires 6M;
    add_header Cache-Control "public" always;
    access_log off;
}

# Изображения в public (логотипы, фото)
location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|css|js)$ {
    expires 6M;
    add_header Cache-Control "public" always;
    access_log off;
}
