      - article [ref=e24]:
        - heading "Политика конфиденциальности" [level=1] [ref=e26]
        - generic [ref=e27]:
          - heading "1. Общие положения" [level=2] [ref=e28]
          - paragraph [ref=e29]: 1.1. Настоящая Политика конфиденциальности персональных данных (далее — Политика) действует в отношении всей информации, которую ООО «Парк Relax» (далее — Оператор) может получить о Пользователе во время использования сайта parkrelax.by и оказания услуг.
          - paragraph [ref=e30]: 1.2. Использование сайта означает безоговорочное согласие Пользователя с настоящей Политикой и указанными в ней условиями обработки его персональных данных. В случае несогласия с условиями Политики Пользователь должен воздержаться от использования сайта.
          - heading "2. Предмет политики" [level=2] [ref=e31]
          - paragraph [ref=e32]: 2.1. Настоящая Политика устанавливает обязательства Оператора по неразглашению и обеспечению режима защиты конфиденциальности персональных данных, которые Пользователь предоставляет по запросу Оператора при регистрации на сайте, при оформлении бронирования или в процессе использования сайта.
          - paragraph [ref=e33]: "2.2. Персональные данные, разрешённые к обработке в рамках настоящей Политики, предоставляются Пользователем путём заполнения регистрационной формы на сайте и включают в себя следующую информацию: фамилию, имя, отчество; контактный телефон; адрес электронной почты; паспортные данные (при необходимости оформления договора)."
          - heading "3. Цели обработки персональных данных" [level=2] [ref=e34]
          - paragraph [ref=e35]: "3.1. Оператор обрабатывает персональные данные Пользователя в следующих целях:"
          - list [ref=e36]:
            - listitem [ref=e37]: идентификация Пользователя, зарегистрированного на сайте;
            - listitem [ref=e38]: предоставление Пользователю доступа к персонализированным ресурсам сайта;
            - listitem [ref=e39]: установление с Пользователем обратной связи, включая направление уведомлений, запросов, касающихся использования сайта, оказания услуг, обработка запросов и заявок от Пользователя;
            - listitem [ref=e40]: определение места нахождения Пользователя для обеспечения безопасности, предотвращения мошенничества;
            - listitem [ref=e41]: подтверждение достоверности и полноты персональных данных, предоставленных Пользователем;
            - listitem [ref=e42]: обработка и получение платежей;
            - listitem [ref=e43]: предоставление Пользователю эффективной клиентской и технической поддержки при возникновении проблем, связанных с использованием сайта;
            - listitem [ref=e44]: предоставление Пользователю с его согласия обновлений продукции, специальных предложений, информации о ценах, новостной рассылки и иных сведений от имени Оператора.
          - heading "4. Правовые основания обработки персональных данных" [level=2] [ref=e45]
          - paragraph [ref=e46]: 4.1. Оператор обрабатывает персональные данные Пользователя только в случае их заполнения и/или отправки Пользователем специальных форм на сайте. Заполняя соответствующие формы и/или отправляя свои персональные данные Оператору, Пользователь выражает свое согласие с данной Политикой.
          - paragraph [ref=e47]: 4.2. Обработка персональных данных Пользователя осуществляется на основании Закона Республики Беларусь от 10 ноября 2008 г. № 455-З «Об информации, информатизации и защите информации», Закона Республики Беларусь от 7 мая 2021 г. № 99-З «О защите персональных данных» и иных нормативных правовых актов Республики Беларусь.
          - heading "5. Порядок сбора, хранения, передачи и других видов обработки персональных данных" [level=2] [ref=e48]
          - paragraph [ref=e49]: 5.1. Безопасность персональных данных, которые обрабатываются Оператором, обеспечивается путём реализации правовых, организационных и технических мер, необходимых для выполнения в полном объёме требований действующего законодательства в области защиты персональных данных.
          - paragraph [ref=e50]: 5.2. Оператор обеспечивает сохранность персональных данных и принимает все возможные меры, исключающие доступ к персональным данным неуполномоченных лиц.
          - paragraph [ref=e51]: 5.3. Персональные данные Пользователя никогда, ни при каких условиях не будут переданы третьим лицам, за исключением случаев, связанных с исполнением действующего законодательства либо в случае, если субъектом персональных данных дано согласие Оператору на передачу данных третьему лицу для исполнения обязательств по гражданско-правовому договору.
          - paragraph [ref=e52]: 5.4. Срок обработки персональных данных определяется достижением целей, для которых были собраны персональные данные, если иной срок не установлен договором или действующим законодательством.
          - heading "6. Права субъекта персональных данных" [level=2] [ref=e53]
          - paragraph [ref=e54]: "6.1. Пользователь — субъект персональных данных — имеет право:"
          - list [ref=e55]:
            - listitem [ref=e56]: получать информацию, касающуюся обработки его персональных данных;
            - listitem [ref=e57]: требовать от Оператора уточнения, блокирования или уничтожения его персональных данных в случае, если они являются неполными, устаревшими, недостоверными, незаконно полученными или не являются необходимыми для заявленной цели обработки;
            - listitem [ref=e58]: отозвать свое согласие на обработку персональных данных;
            - listitem [ref=e59]: осуществлять иные права, предусмотренные законодательством Республики Беларусь.
          - heading "7. Ответственность сторон" [level=2] [ref=e60]
          - paragraph [ref=e61]: 7.1. Оператор, не исполнивший свои обязательства, несёт ответственность за убытки, понесённые Пользователем в связи с неправомерным использованием персональных данных, в соответствии с законодательством Республики Беларусь.
          - paragraph [ref=e62]: 7.2. В случае утраты или разглашения конфиденциальной информации Оператор не несёт ответственности, если данная конфиденциальная информация стала публичным достоянием до её утраты или разглашения, либо была разглашена самим Пользователем или с согласия Пользователя.
          - heading "8. Заключительные положения" [level=2] [ref=e63]
          - paragraph [ref=e64]: 8.1. Оператор имеет право вносить изменения в настоящую Политику конфиденциальности без согласия Пользователя.
          - paragraph [ref=e65]: 8.2. Новая Политика конфиденциальности вступает в силу с момента её размещения на сайте, если иное не предусмотрено новой редакцией Политики.
          - paragraph [ref=e66]: "8.3. По всем вопросам, связанным с обработкой персональных данных, Пользователь может обратиться к Оператору по адресу электронной почты: info@parkrelax.by."
